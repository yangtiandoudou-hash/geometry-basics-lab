<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>图形初步探索实验室</title>
  <style>
    :root {
      --blue: #1268f3;
      --green: #18aa49;
      --orange: #ff9f1a;
      --ink: #071431;
      --muted: #60708a;
      --line: #d8e6f8;
      --panel: rgba(255,255,255,.9);
      --shadow: 0 22px 60px rgba(13,78,180,.12);
      font-family: "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      min-height: 100vh;
      background:
        radial-gradient(circle at 8% 12%, rgba(18,104,243,.14), transparent 30%),
        radial-gradient(circle at 88% 12%, rgba(24,170,73,.12), transparent 24%),
        linear-gradient(180deg, #f8fbff 0%, #edf6ff 100%);
      overflow-x: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(18,104,243,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(18,104,243,.05) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, transparent, #000 18%, #000 82%, transparent);
    }
    .app {
      width: min(1540px, calc(100vw - 44px));
      margin: 0 auto;
      padding: 30px 0 38px;
      position: relative;
      z-index: 1;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 26px;
      margin-bottom: 26px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 22px;
    }
    .lab-icon {
      width: 74px;
      height: 74px;
      border: 5px solid var(--blue);
      border-radius: 24px;
      background:
        conic-gradient(from 45deg, rgba(18,104,243,.18), rgba(24,170,73,.18), rgba(255,159,26,.2), rgba(18,104,243,.18)),
        #fff;
      box-shadow: inset 0 0 0 5px rgba(255,255,255,.75), 0 14px 28px rgba(18,104,243,.18);
      position: relative;
    }
    .lab-icon::before {
      content: "";
      position: absolute;
      left: 17px;
      top: 17px;
      width: 34px;
      height: 34px;
      border: 5px solid var(--blue);
      border-top-color: var(--green);
      transform: rotate(45deg);
      border-radius: 8px;
    }
    h1 {
      font-size: clamp(36px, 4.6vw, 66px);
      line-height: 1;
      margin: 0;
      font-weight: 950;
      letter-spacing: .03em;
    }
    .progress-wrap {
      min-width: 370px;
      flex: 0 1 540px;
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      align-items: center;
      gap: 16px;
      color: #31415e;
      font-size: 20px;
      font-weight: 900;
    }
    .progress {
      height: 20px;
      border-radius: 999px;
      background: #dfe7f5;
      overflow: hidden;
    }
    .progress span {
      display: block;
      height: 100%;
      width: 50%;
      border-radius: inherit;
      background: linear-gradient(90deg, #0f6df2, #18aa49);
      transition: width .3s ease;
    }
    .badge {
      width: 70px;
      height: 76px;
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 28px;
      font-weight: 950;
      background: linear-gradient(180deg, #3a93ff, #0e52d8);
      border: 6px solid #cfe3ff;
      border-radius: 24px 24px 32px 32px;
    }
    .lesson-rail {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      align-items: start;
      margin: 8px 0 30px;
    }
    .lesson-step {
      position: relative;
      text-align: center;
      border: 0;
      background: transparent;
      cursor: pointer;
      color: #60708a;
      padding: 0 4px;
      font: inherit;
      min-width: 0;
    }
    .lesson-step::before {
      content: "";
      position: absolute;
      top: 31px;
      left: 0;
      right: 0;
      border-top: 3px dashed #b9c9e2;
      z-index: 0;
    }
    .lesson-step:first-child::before { left: 50%; }
    .lesson-step:last-child::before { right: 50%; }
    .lesson-num {
      width: 66px;
      height: 66px;
      margin: 0 auto 14px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      border: 6px solid #edf3fb;
      background: #fff;
      color: #29364f;
      font-size: 28px;
      font-weight: 950;
      position: relative;
      z-index: 1;
      box-shadow: 0 8px 18px rgba(13,45,90,.06);
      transition: .2s ease;
    }
    .lesson-title {
      display: block;
      font-size: 18px;
      font-weight: 950;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .lesson-step.active { color: var(--blue); }
    .lesson-step.active .lesson-num {
      color: #fff;
      background: linear-gradient(180deg, #1a86ff, #075be7);
      border-color: #cfe1ff;
      transform: translateY(-5px) scale(1.12);
    }
    .mobile-bar {
      display: none;
      margin-bottom: 18px;
    }
    .mobile-bar select {
      width: 100%;
      border: 2px solid #cfe0f8;
      border-radius: 18px;
      padding: 14px 16px;
      background: #fff;
      color: #17213c;
      font-size: 18px;
      font-weight: 900;
    }
    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 430px;
      gap: 24px;
      align-items: stretch;
    }
    .panel {
      background: var(--panel);
      border: 2px solid #cfe0f8;
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }
    .main-card {
      min-height: 690px;
      padding: 34px 34px 28px;
      overflow: hidden;
    }
    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    .title-row h2 {
      font-size: clamp(30px, 3vw, 48px);
      margin: 0;
      font-weight: 950;
    }
    .task {
      color: #0a4ed6;
      font-size: 24px;
      font-weight: 950;
      border-left: 2px solid #cfd9e8;
      padding-left: 24px;
    }
    .reset {
      border: 2px solid #d9e5f6;
      background: #fff;
      color: #33425e;
      border-radius: 18px;
      padding: 14px 28px;
      font-size: 21px;
      font-weight: 950;
      cursor: pointer;
    }
    .content-tabs {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 14px 0 22px;
    }
    .tab {
      border: 1px solid #d7e4f7;
      background: #fff;
      color: #50617b;
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: 950;
      cursor: pointer;
    }
    .tab.active {
      background: #0f6df2;
      border-color: #0f6df2;
      color: #fff;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .activity-pack,
    .mistake-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-bottom: 18px;
    }
    .activity-card,
    .mistake {
      border: 2px solid #d9e7f8;
      border-radius: 22px;
      background: rgba(255,255,255,.92);
      padding: 18px;
      color: #2c3e5c;
      font-weight: 850;
      line-height: 1.65;
    }
    .activity-card h3,
    .mistake h3 {
      margin: 0 0 10px;
      color: #071637;
      font-size: 22px;
    }
    .activity-card strong,
    .mistake strong { color: var(--blue); }
    .activity-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }
    .activity-tags span {
      border-radius: 999px;
      background: #eef6ff;
      color: #0f61df;
      padding: 8px 12px;
      font-weight: 950;
    }
    .interaction-stage {
      min-height: 430px;
      border: 2px solid #d8e6f8;
      border-radius: 26px;
      background:
        radial-gradient(circle at 85% 82%, rgba(24,170,73,.12), transparent 34%),
        linear-gradient(180deg, rgba(255,255,255,.97), rgba(246,250,255,.94));
      padding: 24px;
      display: grid;
      gap: 18px;
      overflow: hidden;
    }
    .experiment-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      font-size: 24px;
      font-weight: 950;
      color: #071637;
    }
    .experiment-title span {
      color: var(--blue);
      font-size: 18px;
    }
    .lab-feedback {
      border-radius: 20px;
      background: #f0f7ff;
      border: 2px dashed #bdd2ee;
      color: #344765;
      padding: 16px 18px;
      font-size: 18px;
      font-weight: 900;
      line-height: 1.6;
    }
    .card-grid,
    .challenge-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    .geo-card,
    .challenge-card {
      border: 2px solid #dbe8f8;
      border-radius: 22px;
      background: #fff;
      padding: 18px;
      color: #263955;
      font-weight: 900;
      line-height: 1.55;
      box-shadow: 0 12px 26px rgba(13,45,90,.06);
    }
    .geo-card h3,
    .challenge-card h3 {
      margin: 0 0 10px;
      font-size: 22px;
      color: #081433;
    }
    .choice-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    button.choice,
    .choice-row button {
      border: 2px solid #d8e5f7;
      border-radius: 999px;
      background: #f7fbff;
      color: #0d55d9;
      padding: 10px 14px;
      font-size: 17px;
      font-weight: 950;
      cursor: pointer;
    }
    button.correct {
      border-color: rgba(24,170,73,.5) !important;
      background: #eaf9ef !important;
      color: #0d8135 !important;
    }
    button.wrong {
      border-color: rgba(225,72,72,.38) !important;
      background: #fff0f0 !important;
      color: #be2f2f !important;
    }
    .canvas {
      border: 2px solid #dbe8f8;
      border-radius: 24px;
      background: #fff;
      padding: 24px;
      min-height: 270px;
      position: relative;
      overflow: hidden;
    }
    .line-demo,
    .ray-demo,
    .segment-demo {
      position: relative;
      height: 76px;
      margin: 10px 0;
    }
    .line-demo::before,
    .ray-demo::before,
    .segment-demo::before {
      content: "";
      position: absolute;
      left: 10%;
      right: 10%;
      top: 36px;
      height: 6px;
      border-radius: 999px;
      background: #17213c;
    }
    .line-demo::after {
      content: "↔";
      position: absolute;
      left: 5%;
      right: 5%;
      top: 7px;
      font-size: 44px;
      color: var(--blue);
      letter-spacing: 7.6em;
    }
    .ray-demo::after {
      content: "→";
      position: absolute;
      right: 5%;
      top: 7px;
      font-size: 44px;
      color: var(--green);
    }
    .segment-demo span,
    .angle-arm span {
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--blue);
      top: 30px;
    }
    .segment-demo .a { left: 10%; }
    .segment-demo .b { right: 10%; }
    .angle-box {
      height: 270px;
      position: relative;
    }
    .angle-arm {
      position: absolute;
      left: 46%;
      top: 68%;
      width: 220px;
      height: 6px;
      background: #17213c;
      transform-origin: left center;
      border-radius: 999px;
    }
    .arm1 { transform: rotate(0deg); }
    .arm2 { transform: rotate(-55deg); }
    .vertex {
      position: absolute;
      left: 46%;
      top: 68%;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--orange);
      transform: translate(-50%, -50%);
      border: 5px solid #fff2d9;
    }
    .shape {
      min-height: 150px;
      border-radius: 22px;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 18% 16%, rgba(18,104,243,.12), transparent 30%),
        linear-gradient(180deg, #fff, #f3f8ff);
      border: 2px solid #d8e8fb;
      margin-bottom: 12px;
      padding: 12px;
    }
    .shape svg {
      width: min(100%, 260px);
      height: 112px;
      display: block;
    }
    .shape-caption {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 112px;
      margin-top: 4px;
      border-radius: 999px;
      background: #eef6ff;
      color: #0f6df2;
      padding: 7px 12px;
      font-size: 18px;
      font-weight: 950;
    }
    .generation-demo {
      min-height: 170px;
      border: 2px solid #d8e8fb;
      border-radius: 22px;
      background:
        radial-gradient(circle at 18% 18%, rgba(18,104,243,.12), transparent 30%),
        linear-gradient(180deg, #fff, #f5f9ff);
      padding: 14px;
      margin: 16px 0 12px;
      display: grid;
      place-items: center;
    }
    .generation-demo svg {
      width: min(100%, 310px);
      height: 138px;
      display: block;
    }
    .generation-demo .motion-path {
      stroke-dasharray: 9 8;
      animation: dashMove 1.4s linear infinite;
    }
    .generation-demo .sweep {
      opacity: .18;
      animation: glowSweep 1.4s ease-in-out infinite alternate;
    }
    .generation-note {
      border-radius: 18px;
      background: #eef6ff;
      color: #263958;
      padding: 12px 14px;
      font-weight: 900;
      line-height: 1.6;
    }
    .geo-card.observing {
      border-color: rgba(18,104,243,.55);
      box-shadow: 0 18px 36px rgba(18,104,243,.12);
    }
    @keyframes dashMove {
      to { stroke-dashoffset: -34; }
    }
    @keyframes glowSweep {
      from { opacity: .16; }
      to { opacity: .34; }
    }
    .video-card {
      display: grid;
      grid-template-columns: 1.05fr .95fr;
      gap: 22px;
    }
    .video-screen,
    .video-notes {
      border: 2px solid #d6e5fb;
      border-radius: 24px;
      background: #fff;
      padding: 24px;
    }
    .video-screen {
      min-height: 370px;
      background:
        linear-gradient(135deg, rgba(18,104,243,.08), transparent 42%),
        linear-gradient(180deg, #fff, #edf6ff);
      display: grid;
      align-content: space-between;
      gap: 18px;
    }
    .video-kicker {
      display: inline-flex;
      width: fit-content;
      border-radius: 999px;
      background: #eaf3ff;
      color: #0f61df;
      padding: 8px 12px;
      font-size: 15px;
      font-weight: 950;
    }
    .video-screen h3 {
      margin: 14px 0 8px;
      font-size: clamp(28px, 3vw, 42px);
      line-height: 1.16;
      font-weight: 950;
    }
    .video-screen p {
      margin: 0;
      color: #4f607a;
      font-size: 19px;
      line-height: 1.7;
      font-weight: 850;
    }
    .video-board,
    .note-list {
      display: grid;
      gap: 12px;
    }
    .video-board { grid-template-columns: repeat(3, 1fr); }
    .video-board div,
    .note-list div {
      border-radius: 16px;
      background: #f4f9ff;
      padding: 14px;
      color: #243653;
      font-weight: 900;
      line-height: 1.55;
    }
    .video-board strong {
      display: block;
      color: #0f6df2;
      font-size: 20px;
      margin-bottom: 6px;
    }
    .video-resource {
      border-radius: 18px;
      background: #eef6ff;
      border: 2px solid #cfe0f8;
      color: #30425f;
      padding: 14px 16px;
      font-weight: 900;
      line-height: 1.65;
    }
    .video-resource a {
      display: inline-flex;
      width: fit-content;
      margin-top: 10px;
      border-radius: 999px;
      background: #0f6df2;
      color: #fff;
      text-decoration: none;
      padding: 10px 14px;
      font-weight: 950;
    }
    .video-script {
      margin-top: 16px;
      border-radius: 18px;
      background: #f5f9ff;
      padding: 16px;
      color: #40526f;
      font-weight: 850;
      line-height: 1.75;
    }
    .video-script strong { color: #0f6df2; }
    .quiz {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 330px;
      gap: 20px;
      align-items: start;
    }
    .question-list {
      display: grid;
      gap: 16px;
    }
    .question {
      border-radius: 24px;
      background: #fff;
      border: 2px solid #d9e7f8;
      padding: 20px;
    }
    .question h3 {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin: 0 0 12px;
    }
    .question h3 span {
      display: inline-flex;
      min-width: 72px;
      justify-content: center;
      border-radius: 999px;
      background: #eaf3ff;
      color: #0f6df2;
      padding: 6px 10px;
      font-size: 15px;
      font-weight: 950;
    }
    .question p {
      margin: 0 0 18px;
      color: #293a57;
      font-size: 19px;
      font-weight: 900;
      line-height: 1.55;
    }
    .options {
      display: grid;
      gap: 12px;
    }
    .option {
      border: 2px solid #dbe7f8;
      border-radius: 16px;
      background: #f8fbff;
      color: #293a57;
      padding: 12px 14px;
      font-size: 17px;
      font-weight: 900;
      cursor: pointer;
      text-align: left;
    }
    .feedback {
      border-radius: 24px;
      background: #eef6ff;
      border: 2px dashed #bdd2ee;
      padding: 22px;
      min-height: 260px;
      color: #485a75;
      font-size: 18px;
      line-height: 1.7;
      font-weight: 850;
    }
    .side-card {
      padding: 30px 24px 20px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 690px;
    }
    .assistant-head {
      display: flex;
      gap: 16px;
      align-items: center;
      margin-bottom: 22px;
    }
    .bot {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 36% 42%, #0ff 0 6%, transparent 7%),
        radial-gradient(circle at 63% 42%, #0ff 0 6%, transparent 7%),
        linear-gradient(180deg, #f4fbff, #bad8ff);
      border: 6px solid #dbeaff;
      position: relative;
    }
    .bot::before {
      content: "";
      position: absolute;
      left: 14px;
      right: 14px;
      top: 23px;
      height: 27px;
      border-radius: 14px;
      background: #0a1f49;
    }
    .bot::after {
      content: "";
      position: absolute;
      left: 28px;
      top: -10px;
      width: 8px;
      height: 14px;
      border-radius: 8px;
      background: #0f6df2;
    }
    .assistant-head h2 {
      margin: 0 0 8px;
      font-size: 28px;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #54647d;
      font-weight: 850;
    }
    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #16bc54;
    }
    .quick {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      margin: 18px 0;
    }
    .quick button {
      border: 1px solid #d8e5f6;
      background: #f6faff;
      border-radius: 999px;
      padding: 9px 12px;
      color: #40526f;
      font-weight: 900;
      cursor: pointer;
    }

    .ai-config {
      border: 1px solid #dbe8fa;
      background: #f7fbff;
      border-radius: 18px;
      padding: 12px;
      margin: 0 0 14px;
      display: grid;
      gap: 8px;
    }

    .ai-config summary {
      cursor: pointer;
      color: var(--blue);
      font-weight: 950;
    }

    .ai-config label {
      display: grid;
      gap: 5px;
      color: #53647d;
      font-size: 13px;
      font-weight: 900;
    }

    .ai-config input {
      border: 1px solid #d7e4f6;
      border-radius: 12px;
      padding: 9px 10px;
      font: inherit;
      font-size: 13px;
      color: var(--ink);
      background: #fff;
    }

    .ai-config button {
      border: 0;
      border-radius: 12px;
      padding: 10px 12px;
      background: var(--blue);
      color: #fff;
      font-weight: 950;
      cursor: pointer;
    }

    .ai-config small {
      color: #6b7b93;
      line-height: 1.5;
      font-weight: 800;
    }

    .record-card {
      display: grid;
      gap: 16px;
    }

    .record-intro {
      border: 1px solid #dbe8fa;
      background: linear-gradient(135deg, #f7fbff, #eef6ff);
      border-radius: 22px;
      padding: 18px;
      color: #30425f;
      font-weight: 850;
      line-height: 1.7;
    }

    .record-intro strong {
      color: var(--blue);
    }

    .record-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .record-field {
      display: grid;
      gap: 8px;
      padding: 14px;
      border: 1px solid #dbe8fa;
      border-radius: 18px;
      background: rgba(255, 255, 255, .82);
    }

    .record-field label {
      color: var(--ink);
      font-weight: 950;
      line-height: 1.5;
    }

    .record-field textarea {
      width: 100%;

    function downloadRecord() {
      const blob = new Blob([buildRecordText()], { type: "text/plain;charset=utf-8" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "数学实验记录卡-第" + (current + 1) + "课时-" + lessons[current].title + ".txt";
      link.click();
      URL.revokeObjectURL(link.href);
    }

        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");

      if (!btn) return;
      if (btn.dataset.why && !btn.dataset.answer) {
        const card = btn.closest(".geo-card, .challenge-card");
        if (btn.dataset.demo && card) {
          card.classList.add("observing");
          const slot = card.querySelector(".generation-slot");
          if (slot) slot.innerHTML = generationDiagram(btn.dataset.demo);
        }
        btn.classList.add("correct");
        setFeedback(btn.dataset.why);
      }
      if (btn.dataset.answer) {
        const ok = btn.dataset.answer === btn.dataset.right;
        const card = btn.closest(".geo-card, .challenge-card");
        if (card) card.querySelectorAll("button").forEach(item => item.classList.remove("correct", "wrong"));
        btn.classList.add(ok ? "correct" : "wrong");
        setFeedback(ok ? `判断正确：${btn.dataset.why}` : `再回到定义。正确答案是${btn.dataset.right}，因为${btn.dataset.why}`);

      const answer = quiz.answer;
      const questionCard = option.closest(".question");
      questionCard.querySelectorAll(".option").forEach(btn => {
        btn.classList.remove("correct", "wrong");
        if (Number(btn.dataset.answer) === answer) btn.classList.add("correct");
      });
      if (Number(option.dataset.answer) !== answer) option.classList.add("wrong");

    function replyFor(text) {
      const lesson = lessons[current];
      if (/反例|特殊|counterexample/i.test(text)) return "可以找一个外形相似但条件缺失的图形：例如两条线段画得很长，不代表角更大；判断反例时要回到定义，看顶点、边或张口是否符合条件。";
      if (/直线|射线|线段|line|ray|segment/i.test(text)) return "看端点和延伸方向：直线无端点，射线一个端点，线段两个端点且可测量长度。";
      if (/角|大小|angle|size/i.test(text)) return "角的大小看两边张开的程度，不看边画得长不长。";
      if (/定义|为什么|why|definition/i.test(text)) return `本课容易错在：${lesson.mistakes[0]}。先背定义，再用图验证。`;
      return `本课“${lesson.title}”先抓住这句：${lesson.video[0]} 你也可以切到小测试，我会根据答案分析错因。`;
    }

      const config = getAiConfig();
      aiStatus.innerHTML = config.baseUrl && config.apiKey
        ? `<span class="dot"></span>真实 AI 已配置`
        : `<span class="dot"></span>本地讲解模式`;
    }

    function loadAiConfig() {
      const config = getAiConfig();
      aiBaseUrl.value = config.baseUrl || "";
      aiApiKey.value = config.apiKey || "";
      aiModel.value = config.model || "gpt-4o-mini";
      setAiStatus();
    }

    saveAiConfig.addEventListener("click", () => {
      localStorage.setItem(aiConfigKey, JSON.stringify({
        baseUrl: aiBaseUrl.value.trim(),
        apiKey: aiApiKey.value.trim(),
        model: aiModel.value.trim() || "gpt-4o-mini"
      }));
      setAiStatus();
      addBubble("AI接口设置已保存。下一次提问会优先调用真实模型。", "ai");
    });

    async function askRealAi(text) {
      const config = getAiConfig();
      if (!config.baseUrl || !config.apiKey) return "";
      const lesson = lessons[current];
      const endpoint = `${config.baseUrl.replace(/\/+$/, "")}/chat/completions`;
      const response = await fetch(endpoint, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${config.apiKey}`
        },
        body: JSON.stringify({
          model: config.model || "gpt-4o-mini",
          temperature: 0.25,
          messages: [
            { role: "system", content: "你是七年级数学预习AI助教。回答要准确、温和、分步骤，优先启发学生思考。每次回答控制在180字以内，不要编造视频或外部链接。" },
            { role: "user", content: `当前专题：图形初步。当前课时：${lesson.title}。学习目标：${lesson.task}。学生问题：${text}` }
          ]
        })
      });
      if (!response.ok) throw new Error(`AI接口返回 ${response.status}`);
      const data = await response.json();
      return data.choices?.[0]?.message?.content?.trim() || "";
    }

    async function answerQuestion(text) {
      const bubble = addBubble("正在连接AI助教...", "ai");
      try {
        bubble.textContent = await askRealAi(text) || replyFor(text);
      } catch (error) {
        bubble.textContent = `AI接口暂时不可用，先用本地讲解帮你：${replyFor(text)}`;
      }
      chat.scrollTop = chat.scrollHeight;
    }

    async function submitQuestion(event) {
      event.preventDefault();
      const text = askInput.value.trim();
      if (!text) return;
      addBubble(text, "user");
      askInput.value = "";
      await answerQuestion(text);
    }
    askForm.addEventListener("submit", submitQuestion);
    askInput.addEventListener("keydown", event => {
      if (event.key === "Enter") submitQuestion(event);
    });
    quick.addEventListener("click", event => {
      const btn = event.target.closest("button");
      if (!btn) return;
      addBubble(btn.textContent, "user");
      answerQuestion(btn.textContent);
    });

    loadAiConfig();
    initNav();
    renderLesson(current);
  </script>
</body>
</html>
